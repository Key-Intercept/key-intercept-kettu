name: Release Build

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Make script executable
        run: chmod +x key-intercept-test.sh

      - name: Run test script
        run: ./key-intercept-test.sh

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query GitHub Releases API for the latest release tag
          latest_tag=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest" \
            | python -c "import sys,json; j=json.load(sys.stdin); print(j.get('tag_name') or '')")
          if [ -z "$latest_tag" ]; then
            echo "No previous release found, defaulting to v0.0.0"
            latest_tag="v0.0.0"
          fi
          # Remove leading 'v' if present and split semver
          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          major=${major:-0}; minor=${minor:-0}; patch=${patch:-0}
          # Extract numeric prefix from patch and increment patch
          patch_num=$(echo "$patch" | sed 's/[^0-9].*//')
          patch_num=${patch_num:-0}
          new_patch=$((patch_num + 1))
          VERSION="${major}.${minor}.${new_patch}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Linux Zip
        run: zip -r key-intercept-linux.zip key-intercept key-intercept-install.sh

      - name: Create Windows Zip
        run: zip -r key-intercept-windows.zip key-intercept key-intercept-install.ps1 key-intercept-CLICK-ME.bat

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "Release v${{ env.VERSION }}"
          files: |
            key-intercept-linux.zip
            key-intercept-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
