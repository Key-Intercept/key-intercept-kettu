name: Build and Deploy Plugin

on:
  push:
    branches:
      - main # Change this to "master" if your repository uses the older default name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using LTS Node
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Safer and faster than 'npm install' for CI environments

      - name: Build Plugin
        run: npm run build # Triggers node build.mjs to generate your dist/ folder

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Deploys only the compiled output inside dist/
          branch: gh-pages # Destined branch name for GitHub Pages to read from
          clean: true # Automatically removes old/stale assets