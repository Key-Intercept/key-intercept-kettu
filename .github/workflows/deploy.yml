name: Build and Deploy Plugin

on:
  push:
    branches:
      - main # Change this to "master" if your repository uses the older default name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Uses the latest major stable version of pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm' # Configures setup-node to cache pnpm store directories

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile # Reconciles package.json even if pnpm-lock.yaml is missing or out of sync

      - name: Build Plugin
        run: pnpm run build # Triggers your build.mjs script via pnpm

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true